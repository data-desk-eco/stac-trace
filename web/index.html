<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>STAC TRACE / satellite imagery activity</title>
  <meta name="description" content="Real-time EO satellite constellation visualizer showing where high-resolution imagery is being collected">
  <meta property="og:title" content="STAC TRACE">
  <meta property="og:description" content="Watch the watchers — real-time satellite imagery collection activity">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://ltrg.co.uk/stac-trace/og-image.png">
  <meta property="og:url" content="https://ltrg.co.uk/stac-trace/">
  <meta name="twitter:card" content="summary_large_image">
  <script type="importmap">
  {
    "imports": {
      "apache-arrow": "https://cdn.jsdelivr.net/npm/apache-arrow@17.0.0/+esm"
    }
  }
  </script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛰️</text></svg>">
  <link href="https://unpkg.com/maplibre-gl@5.19.0/dist/maplibre-gl.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <div id="loading">
    <div id="loading-inner">
      <div id="loading-title">🛰️ STAC<span class="title-trace">TRACE</span></div>
      <div id="loading-status">Initialising...</div>
    </div>
  </div>
  <div id="map"></div>
  <div id="panel" class="panel glass">
    <h1>🛰️ STAC<span class="title-trace">TRACE</span></h1>
    <p class="subtitle">Real-time positions of Earth observation satellites showing where high-resolution imagery is being collected.</p>
    <div id="sat-info"></div>
  </div>
  <div id="legend" class="panel glass">
    <h4>Operator</h4>
    <div id="legend-items"></div>
  </div>
  <div id="date-slider-wrap">
    <div id="date-slider" class="panel glass">
      <div id="slider-histogram"></div>
      <div id="slider-track">
        <div id="slider-range"></div>
        <div id="slider-ticks"></div>
      </div>
      <div id="slider-labels"></div>
    </div>
    <button id="play-btn" class="panel glass" title="Animate">▶</button>
  </div>
  <div id="tooltip" class="glass"></div>
  <script src="https://unpkg.com/maplibre-gl@5.19.0/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/satellite.js@5.0.0/dist/satellite.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
