name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download data from latest release
        run: |
          gh release download latest-data --pattern 'data.zip' --dir . 2>/dev/null || true
          mkdir -p web/data
          if [ -f data.zip ]; then
            # Selective extract — frontend needs only these. stac.duckdb is 1.2GB
            # and would OOM the runner; it's only used by the sync pipeline.
            unzip -o data.zip -d web/data tles.txt satellites.json footprints.parquet cache.parquet
            rm data.zip
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
