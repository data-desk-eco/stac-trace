name: Update data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Download existing data
        run: |
          gh release download latest-data --pattern 'data.zip' --dir . 2>/dev/null || true
          mkdir -p data
          if [ -f data.zip ]; then unzip data.zip -d data && rm data.zip; fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Fetch TLEs
        run: uv run scripts/fetch_tles.py

      - name: Sync STAC data
        run: uv run scripts/sync_stac.py --days 7
        env:
          UP42_USERNAME: ${{ secrets.UP42_USERNAME }}
          UP42_PASSWORD: ${{ secrets.UP42_PASSWORD }}

      - name: Export GeoParquet
        run: uv run scripts/export_parquet.py

      - name: Package and upload data
        run: |
          cd data
          zip -r ../data.zip tles.txt satellites.json footprints.parquet stac.duckdb
          cd ..
          gh release create latest-data --title "Data" --notes "Auto-updated data files" 2>/dev/null || true
          gh release upload latest-data data.zip --clobber
          rm data.zip
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Copy data into web directory
        run: |
          mkdir -p web/data
          cp data/tles.txt data/satellites.json data/footprints.parquet web/data/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deployment
        uses: actions/deploy-pages@v4
